name: Sari Weather Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'       # every hour at minute 0

jobs:
  send-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run weather forecast script
        env:
          RUBIKA_TOKEN: ${{ secrets.RUBIKA_TOKEN }}
        run: python weather_forecast.py
